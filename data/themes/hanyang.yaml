name: "Hanyang"

# 가독성을 높인 흰색 배경과 한양대 다크 블루 포인트
light:
  primary: "#00307A"      # 한양대 다크 블루 (버튼, 링크, 강조 색상)
  background: "#FFFFFF"   # 완전한 흰색 (기본 배경)
  background_alt: "#F8F9FA" # 아주 연한 회색 (섹션 배경 구분용)
  text: "#222222"         # 진한 짙은 회색 (가독성 높은 기본 글씨)
  text_alt: "#555555"     # 서브 텍스트 (날짜, 부제목 등)
  text_light: "#888888"   # 더 연한 글씨
